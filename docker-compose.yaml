# ImTakt Server only — data harness runs in sibling repo imtakt-gtfs

services:
  imtakt-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3001"
      MEILI_URL: ${MEILI_URL:-http://host.docker.internal:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev-master-key}
      MOTIS_URL: ${MOTIS_URL:-http://host.docker.internal:8080}
      MOTIS_DATASET_TAG: de
      IMTAKT_ARCHIVE: ${IMTAKT_ARCHIVE:-0}
      IMTAKT_SEMANTIC_RERANK: "1"
      FEED_MANIFEST_PATH: ${FEED_MANIFEST_PATH:-/data/feed-manifest.json}
      FEED_MAX_AGE_HOURS: ${FEED_MAX_AGE_HOURS:-48}
    volumes:
      - ${FEED_MANIFEST_PATH:-./.feed-manifest.json}:/data/feed-manifest.json:ro
